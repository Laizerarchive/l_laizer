<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Laizer Messages</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;

      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: "Bookmannia", monospace;
    }

    .background-container {
      position: fixed;

      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      background-image: url("screen6.png");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      z-index: -1;
    }

    .phone-window {
      width: 320px;
      height: 520px;

      background: #cfcfcf;

      border: 4px solid #1e1e1e;
      border-radius: 38px;

      padding: 16px 16px;

      box-shadow: 12px 12px 0 #323232;
       transform: translateY(-10px);
    }

    .phone-screen {
      width: 100%;
      height: 100%;

      background: #b6a0d8;

      border: 4px solid #000;

      padding: 18px;

      display: flex;
      flex-direction: column;
    }

    .sms-header {
      text-align: center;

      font-size: 20px;
      font-weight: bold;

      margin-bottom: 18px;
      padding-bottom: 12px;

      border-bottom: 4px solid #4a4a4a;

      color: #1c1c1c;
    }

    .sms-chat {
      flex: 1;

      display: flex;
      flex-direction: column;

      gap: 16px;

      overflow-y: auto;
    }

    .sms-message {
      max-width: 82%;

      padding: 12px 14px;

      font-size: 16px;
      line-height: 1.4;

      border: 4px solid #3d3d3d;

      background: #e4d9f5;

      word-break: break-word;
    }

    .sms-message.received {
      align-self: flex-start;
    }

    .sms-message.sent {
      align-self: flex-end;

      background: #f2eaff;
    }

    .sms-input-row {
      display: flex;

      gap: 8px;

      margin-top: 18px;
    }

    .sms-input-row input {
      flex: 1;

      height: 38px;

      padding: 6px 10px;

      border: 4px inset #777;

      background: #f5efff;

      font-size: 14px;

      font-family: inherit;

      outline: none;
    }

    .sms-input-row button {
      width: 92px;

      border: 4px outset #cfcfcf;

      background: #d8c6f0;

      font-size: 14px;

      font-family: inherit;

      cursor: pointer;
    }

    .sms-input-row button:active {
      border: 4px inset #cfcfcf;
    }

  </style>

</head>

<body>

  <div class="background-container"></div>

  <div class="phone-window">

    <div class="phone-screen">

      <div class="sms-header">
        Share your dream
      </div>

      <div class="sms-chat">

        <div class="sms-message received">
         What was your childhood dream?
        </div>

        <div class="sms-message sent">
          Share your dream with the Laizer archive
        </div>

      </div>

      <div class="sms-input-row">

        <input
          type="text"
          id="smsInput"
          placeholder="Type your dream..."
        />

        <button id="smsSend">
          Send
        </button>

      </div>

    </div>

  </div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyAC5ulcLBtrRbmQ4deK1HTOQ5LPSbR7-78",
  authDomain: "laizer-e5803.firebaseapp.com",
  projectId: "laizer-e5803",
  storageBucket: "laizer-e5803.firebasestorage.app",
  messagingSenderId: "719956823015",
  appId: "1:719956823015:web:cd83b1536824c8127a0b42",
  measurementId: "G-6L04YDQTRR"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


const smsInput =
  document.getElementById("smsInput");

const smsSend =
  document.getElementById("smsSend");


smsSend.addEventListener("click", sendMessage);


smsInput.addEventListener("keydown", (e) => {

  if (e.key === "Enter") {
    sendMessage();
  }

});


async function sendMessage() {

  const text = smsInput.value.trim();

  if (!text) return;

  try {

    await addDoc(
      collection(db, "laizerMessages"),
      {
        name:
          "visitor_" +
          Math.floor(Math.random() * 9999),

        text: text,

        createdAt: serverTimestamp()
      }
    );

    window.location.href =
      "archive.html";

  }

  catch (error) {

    console.error(error);

    alert("Error sending message");

  }

}

</script>

</body>

</html>

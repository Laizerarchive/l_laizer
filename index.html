```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laizer - Dreams Archive</title>

    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .phone-window {
            position: fixed;
            right: 30px;
            bottom: 100px;
            width: 260px;
            height: 430px;
            background: #cfcfcf;
            border: 4px solid #222;
            border-radius: 28px;
            padding: 18px 12px;
            z-index: 1200;
            box-shadow: 6px 6px 0 #000;
        }

        .phone-screen {
            height: 100%;
            background: #9fb38f;
            border: 3px inset #333;
            padding: 10px;
            display: flex;
            flex-direction: column;
            font-family: "Courier New", monospace;
        }

        .sms-header {
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 2px solid #333;
            padding-bottom: 6px;
            margin-bottom: 8px;
        }

        .sms-chat {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sms-message {
            max-width: 80%;
            padding: 6px 8px;
            font-size: 12px;
            border: 2px solid #333;
            background: #dce6c8;
            word-break: break-word;
        }

        .sms-message.received {
            align-self: flex-start;
        }

        .sms-message.sent {
            align-self: flex-end;
            background: #f0f0d8;
        }

        .sms-input-row {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .sms-input-row input {
            flex: 1;
            font-size: 12px;
            padding: 4px;
            background: #e4e8d0;
            border: 2px inset #333;
        }

        .sms-input-row button {
            font-size: 11px;
            border: 2px outset #333;
            background: #ddd;
            cursor: pointer;
        }
    </style>
</head>

<body class="archive-body">

    <div class="background-container"></div>

    <img src="bottom@2x.png" class="bottom-image">

    <div class="archive-container" id="dreamsArchiveContainer">
        <!-- Dreams will be dynamically inserted here -->
    </div>

    <!-- Audio Player Window -->
    <div class="window" id="audioPlayerContainer"
        style="position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        width: 450px;">

        <div class="title-bar">
            <div class="title-bar-text">Music Player</div>

            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>

        <div class="window-body">

            <!-- Audio Screen Display -->
            <div class="audio-screen" id="audioDisplay">
                Playing...
            </div>

            <!-- Audio Element -->
            <audio id="mainAudioPlayer" style="display: none;">
                <source src="audio.mp3" type="audio/mpeg">
            </audio>

            <!-- Controls -->
            <div class="audio-controls">

                <div class="audio-buttons">
                    <button class="retro-btn" id="btnPlay">▶</button>
                    <button class="retro-btn" id="btnPause">⏸</button>
                    <button class="retro-btn" id="btnStop">⏹</button>
                </div>

                <input
                    type="range"
                    id="range2"
                    min="0"
                    max="100"
                    value="0"
                    style="width: 100%; margin-top: 10px; cursor: pointer;"
                >
            </div>
        </div>
    </div>

    <!-- OLD PHONE SMS WINDOW -->
    <div class="phone-window">

        <div class="phone-screen">

            <div class="sms-header">
                Messages
            </div>

            <div class="sms-chat" id="smsChat">

                <div class="sms-message received">
                    Welcome to Laizer archive...
                </div>

                <div class="sms-message sent">
                    I want to leave a dream.
                </div>

            </div>

            <div class="sms-input-row">
                <input
                    type="text"
                    id="smsInput"
                    placeholder="Type message..."
                >

                <button id="smsSend">
                    Send
                </button>
            </div>

        </div>
    </div>

    <!-- Social Media Links -->
    <div class="audio-links"
        style="position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;">

        <a href="https://instagram.com"
            target="_blank"
            class="retro-link-btn">
            Instagram
        </a>

        <a href="https://twitter.com"
            target="_blank"
            class="retro-link-btn">
            Twitter
        </a>

        <a href="https://tiktok.com"
            target="_blank"
            class="retro-link-btn">
            TikTok
        </a>

        <a href="https://youtube.com"
            target="_blank"
            class="retro-link-btn">
            YouTube
        </a>
    </div>

    <!-- Streaming Platform Links -->
    <div class="platform-links">

        <a href="https://spotify.com"
            target="_blank"
            class="spotify">
            Spotify
        </a>

        <a href="https://music.apple.com"
            target="_blank"
            class="apple">
            Apple Music
        </a>

        <a href="https://youtube.com"
            target="_blank"
            class="youtube">
            YouTube
        </a>

        <a href="https://soundcloud.com"
            target="_blank"
            class="soundcloud">
            SoundCloud
        </a>

        <a href="https://bandcamp.com"
            target="_blank"
            class="bandcamp">
            Bandcamp
        </a>

        <a href="https://tidal.com"
            target="_blank"
            class="tidal">
            Tidal
        </a>

        <a href="https://music.amazon.com"
            target="_blank"
            class="amazon">
            Amazon Music
        </a>

    </div>

    <script>
        const smsInput = document.getElementById("smsInput");
        const smsSend = document.getElementById("smsSend");
        const smsChat = document.getElementById("smsChat");

        smsSend.addEventListener("click", sendSmsMessage);

        smsInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                sendSmsMessage();
            }
        });

        function sendSmsMessage() {

            const text = smsInput.value.trim();

            if (!text) return;

            const message = document.createElement("div");

            message.className = "sms-message sent";

            message.textContent = text;

            smsChat.appendChild(message);

            smsInput.value = "";

            smsChat.scrollTop = smsChat.scrollHeight;
        }
    </script>

    <script type="module" src="script.js"></script>

</body>
</html>
```

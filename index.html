<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laizer - Childhood Dream</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container"></div>
    <img src="bottom@2x.png" class="bottom-image">

    <div class="window main-window" id="inputWindow" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000;">
        <div class="title-bar">
            <div class="title-bar-text">Welcome</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>

        <div class="window-body">
            <p>What was your childhood dream?</p>

            <label for="dreamInput">Your Message:</label>
            <div class="field-row-stacked">
                <textarea id="dreamInput" rows="5" class="dream-textarea" placeholder="Write your message here"></textarea>
            </div>

            <div id="loadingContainer" style="display: none; margin-top: 15px;">
                <div class="progress-indicator-container">
                    <div class="progress-bar-fill" id="loadingBar"></div>
                </div>
                <p style="font-size: 11px; text-align: left; margin-top: 5px; margin-bottom: 0;">Loading...</p>
            </div>

            <div class="button-container" id="sendBtnContainer">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>

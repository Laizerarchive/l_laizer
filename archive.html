<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Laizer Archive</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;

      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;

      font-family: "Bookmania", monospace;
    }

    .background-container {
      position: fixed;

      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      background-image: url("screen6.png");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      z-index: -1;
    }

    .phone-window {
      width: 320px;
      height: 520px;

      background: #cfcfcf;

      border: 4px solid #323232;
      border-radius: 38px;

      padding: 16px 16px;

      box-shadow: 6px 6px 0 #323232;

      z-index: 10;
    }

    .phone-screen {
      width: 100%;
      height: 100%;

      background: #b6a0d8;

      border: 4px solid #323232;
      border-radius: 28px;

      padding: 16px;

      display: flex;
      flex-direction: column;
    }

    .track-block {
      border: 4px solid #3d3d3d;

      background: #e4d9f5;

      padding: 10px;

      margin-bottom: 12px;

      text-align: center;
    }

    .track-title {
      font-size: 14px;
      font-weight: bold;

      margin-bottom: 8px;
    }

    .track-btn {
      width: 100%;

      padding: 8px;

      border: 4px outset #cfcfcf;

      background: #d8c6f0;

      font-family: inherit;

      cursor: pointer;
    }

    .track-btn:active {
      border: 4px inset #cfcfcf;
    }

    .sms-header {
      text-align: center;

      font-size: 20px;
      font-weight: bold;

      margin-bottom: 14px;
      padding-bottom: 10px;

      border-bottom: 4px solid #4a4a4a;
    }

    .sms-chat {
      flex: 1;

      display: flex;
      flex-direction: column;

      gap: 14px;

      overflow-y: auto;
    }

    .sms-message {
      max-width: 82%;

      padding: 10px 12px;

      font-size: 14px;

      border: 4px solid #3d3d3d;

      background: #e4d9f5;

      line-height: 1.4;

      word-break: break-word;
    }

    .sms-message.received {
      align-self: flex-start;
    }

    .sms-message.sent {
      align-self: flex-end;

      background: #f2eaff;
    }

    .user-name {
      display: block;

      font-size: 11px;
      font-weight: bold;

      margin-bottom: 4px;

      opacity: 0.7;
    }

    .bottom-controls {
      margin-top: 14px;
    }

    .listen-btn {
      width: 100%;

      padding: 8px;

      border: 4px outset #cfcfcf;

      background: #d8c6f0;

      font-family: inherit;

      font-size: 15px;
      font-weight: bold;

      cursor: pointer;
    }

    .listen-btn:active {
      border: 4px inset #cfcfcf;
    }

    .platform-links {
      display: none;

      flex-direction: column;

      gap: 6px;

      margin-top: 8px;
    }

    .platform-links.active {
      display: flex;
    }

    .platform-links a {
      display: block;

      padding: 7px;

      text-align: center;

      text-decoration: none;

      color: #1c1c1c;

      background: #f2eaff;

      border: 4px outset #cfcfcf;
    }

    .platform-links a:active {
      border: 4px inset #cfcfcf;
    }

  </style>

</head>

<body>

  <div class="background-container"></div>

  <div class="phone-window">

    <div class="phone-screen">

      <div class="track-block">

        <div class="track-title">
          LAIZER — Earthworm
        </div>

        <button class="track-btn" id="playTrackBtn">
          ▶ Listen track
        </button>

        <audio id="mainAudioPlayer">
  <source src="29 apr Earthworm 5 .mp3" type="audio/mpeg">
</audio>

      </div>

      <div class="sms-header">
        Archive Messages
      </div>

      <div class="sms-chat" id="smsChat"></div>

      <div class="bottom-controls">

        <button class="listen-btn" id="listenBtn">
          LISTEN
        </button>

        <div class="platform-links" id="platformLinks">

          <a href="https://open.spotify.com/track/4wSMuydBSmSJ7RU60E7DlL?si=t273-NUsQw2Caz9To9YleQ" target="_blank">
            Spotify
          </a>

          <a href="https:https://music.apple.com/kr/album/earthworm/6769746555?i=6769746556&l=en-GB" target="_blank">
            Apple Music
          </a>

          <a href="https://www.instagram.com/laizermusic" target="_blank">
            Instagram
          </a>

          <a href="https://www.tiktok.com/@laizermusic" target="_blank">
            TikTok
          </a>

          

        </div>

      </div>

    </div>

  </div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  query,
  orderBy,
  limit,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyAC5ulcLBtrRbmQ4deK1HTOQ5LPSbR7-78",
  authDomain: "laizer-e5803.firebaseapp.com",
  projectId: "laizer-e5803",
  storageBucket: "laizer-e5803.firebasestorage.app",
  messagingSenderId: "719956823015",
  appId: "1:719956823015:web:cd83b1536824c8127a0b42",
  measurementId: "G-6L04YDQTRR"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


const smsChat =
  document.getElementById("smsChat");

const playTrackBtn =
  document.getElementById("playTrackBtn");

const audio =
  document.getElementById("mainAudioPlayer");

const listenBtn =
  document.getElementById("listenBtn");

const platformLinks =
  document.getElementById("platformLinks");


const messagesQuery = query(
  collection(db, "laizerMessages"),
  orderBy("createdAt", "desc"),
  limit(30)
);


onSnapshot(messagesQuery, (snapshot) => {

  smsChat.innerHTML = "";

  const messages = [];

  snapshot.forEach((doc) => {

    messages.push(doc.data());

  });

  messages.sort(() => Math.random() - 0.5);

  messages.forEach((item, index) => {

    setTimeout(() => {

      const message =
        document.createElement("div");

      message.className =
        index % 2 === 0
          ? "sms-message received"
          : "sms-message sent";

      message.innerHTML = `
        <span class="user-name">
          ${item.name || "visitor"}
        </span>

        ${item.text || ""}
      `;

      smsChat.appendChild(message);

      smsChat.scrollTop =
        smsChat.scrollHeight;

    }, index * 500);

  });

});


playTrackBtn.addEventListener("click", () => {

  if (audio.paused) {

    audio.play();

    playTrackBtn.textContent =
      "⏸ Pause track";

  }

  else {

    audio.pause();

    playTrackBtn.textContent =
      "▶ Listen track";

  }

});


listenBtn.addEventListener("click", () => {

  platformLinks.classList.toggle("active");

});

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laizer - Dreams Archive</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="archive-body">
    <div class="background-container"></div>
    
    <div class="archive-container" id="dreamsArchiveContainer">
        <!-- Dreams will be dynamically inserted here -->
    </div>

    <!-- Audio Player Window -->
    <div class="window" id="audioPlayerContainer" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);z-index: 1000;width: 450px;">
        <div class="title-bar">
            <div class="title-bar-text">Music Player</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <!-- Audio Screen Display -->
            <div class="audio-screen" id="audioDisplay">Playing...</div>
            
            <!-- Audio Element (hidden) -->
            <audio id="mainAudioPlayer" style="display: none;">
                <source src="audio.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <!-- Controls -->
            <div class="audio-controls">
                <div class="audio-buttons">
                    <button class="retro-btn" id="btnPlay">▶</button>
                    <button class="retro-btn" id="btnPause">⏸</button>
                    <button class="retro-btn" id="btnStop">⏹</button>
                </div>
                <input type="range" id="range2" min="0" max="100" value="0" style="width: 100%; margin-top: 10px; cursor: pointer;">
            </div>
        </div>
    </div>

    <!-- Social Media Links -->
    <div class="audio-links" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999;">
        <a href="https://instagram.com" target="_blank" class="retro-link-btn">Instagram</a>
        <a href="https://twitter.com" target="_blank" class="retro-link-btn">Twitter</a>
        <a href="https://tiktok.com" target="_blank" class="retro-link-btn">TikTok</a>
        <a href="https://youtube.com" target="_blank" class="retro-link-btn">YouTube</a>
    </div>
<!-- Streaming Platform Links -->
<div class="audio-links" style="
    .platform-links {
    position: fixed;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    
    display: flex;
    flex-direction: column;
    gap: 12px;

    z-index: 999;
}

.platform-links a {
    text-decoration: none;
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 8px 14px;
    border: 2px solid black;
    box-shadow: 2px 2px 0px black;
    transition: 0.15s;
    width: 150px;
}

.platform-links a:hover {
    transform: translateX(5px);
}

/* Platform Colors */

.spotify {
    background: #1DB954;
    color: black;
}

.apple {
    background: #d9d9d9;
    color: black;
}

.youtube {
    background: #ff0000;
    color: white;
}

.soundcloud {
    background: #ff7700;
    color: white;
}

.bandcamp {
    background: #629aa9;
    color: white;
}

.tidal {
    background: black;
    color: white;
}

.amazon {
    background: #00A8E1;
    color: black;
}

</div>
    <script src="script.js"></script>
</body>
</html>
